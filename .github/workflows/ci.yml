name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run ci
